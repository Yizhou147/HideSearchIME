plugins {
    id 'com.android.application'
}

android {
    namespace 'com.hide.searchime'
    compileSdk 35

    defaultConfig {
        applicationId "com.hide.searchime"
        minSdk 30
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    // Xposed API（compileOnly，不打包进 APK）
    compileOnly 'de.robv.android.xposed:api:82'
}
